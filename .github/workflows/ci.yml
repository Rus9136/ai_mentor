name: CI — Lint & Test

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_mentor_test_db
          POSTGRES_USER: ai_mentor_user
          POSTGRES_PASSWORD: ai_mentor_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"
      # App config (needed for imports, not for actual API calls)
      SECRET_KEY: test-secret-key-for-ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_mentor_test_db
      POSTGRES_USER: ai_mentor_user
      POSTGRES_PASSWORD: ai_mentor_pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Init test database (extensions)
        run: |
          PGPASSWORD=ai_mentor_pass psql -h localhost -U ai_mentor_user -d ai_mentor_test_db -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
          "

      - name: Run tests
        working-directory: backend
        run: |
          poetry run pytest \
            tests/test_onboarding_partial_state.py \
            tests/test_onboarding_atomicity.py \
            tests/test_join_request_approval.py \
            tests/test_route_conflicts.py \
            -v \
            --tb=short \
            -x

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
